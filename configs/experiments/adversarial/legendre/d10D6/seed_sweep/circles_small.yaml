# @package _global_
experiment: seed_sweep

defaults:
  - override /born: legendre/d10D6
  - override /dataset: 2Dtoy/circles_small
  - override /trainer/classification: null
  - override /trainer/adversarial: pgd_at
  - override /trainer/ganstyle: null
  - override /trainer/generative: null
  - override /tracking: online

model_path: outputs/seed_sweep/cls/legendre/d10D6/circles_small_2804/3/models/cls

dataset:
  split_seed: 11
  gen_dow_kwargs:
    seed: 25

tracking:
  seed: 42
  evasion:
    method: "PGD"
    norm: 2
    criterion:
      name: "negative log-likelihood"
      kwargs:
        eps: 1e-8
    strengths: [0.1]
    num_steps: 10
    step_size: null
    random_start: true

trainer:
  adversarial:
    max_epoch: 1000
    batch_size: 256
    method: "pgd_at"
    stop_crit: "rob"
    patience: 1000
    watch_freq: 0
    metrics: {"rob": 1, "clsloss": null, "acc": null}

    evasion:
      method: "PGD"
      norm: 2
      criterion:
        name: "negative log-likelihood"
        kwargs:
          eps: 1e-8
      strengths: [0.1]
      num_steps: 10
      step_size: null
      random_start: true

    curriculum: true
    curriculum_start: 0.01
    curriculum_end_epoch: 80

    save: true
    auto_stack: true
    auto_unbind: false

    optimizer:
      kwargs:
        lr: 0.0007182073502747859                  # FILL FROM HPO
        weight_decay: 7.834746082871248e-07        # FILL FROM HPO
    clean_weight: 0.32982466356507195            # FILL FROM HPO

hydra:
  sweeper:
    params:
      tracking.seed: range(1,21)
